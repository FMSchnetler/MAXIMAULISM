<!DOCTYPE html>
<!--
  MAXIMAULISM — ROUND 2, PROTOTYPE 4: "BLACK RELIQUARY"
  The core 1+3 mix: prototype 1's dark cinematic ground + prototype 3's gold
  ornamental arch and blackletter title. Cleanest, most restrained of R2.
  Stand-in hero: Bohémond I of Antioch (Blondel 1843, public domain).
  >>> SWAP: replace assets/crusader-stand-in.jpg; retune --eyeL/--eyeR. <<<
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIMAULISM — Black Reliquary</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#e6c25c; --gold-dp:#b8860b; --blood:#8f1414; --electric:#d6ecff;
    --eyeL-x:44%; --eyeL-y:25%; --eyeR-x:52%; --eyeR-y:24%; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; overflow-x:hidden; color:#e9e2d0; background:#050505;
    font-family:'EB Garamond',Georgia,serif;
    background-image:radial-gradient(circle at 50% 30%, rgba(230,194,92,.10), transparent 60%); }
  body::after{ content:""; position:fixed; inset:0; z-index:50; pointer-events:none; opacity:.35;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.4) 0 1px, transparent 1px 3px); mix-blend-mode:multiply; }

  .blackletter{ font-family:'UnifrakturCook',serif; }
  .title{ font-size:clamp(2.6rem,12vw,9rem); line-height:.9; color:#f4ecd6;
    text-shadow:1px 1px 0 var(--gold-dp), 0 0 34px rgba(230,194,92,.35); }
  .slogan{ font-family:'Cinzel',serif; letter-spacing:.08em; }
  .rule{ height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }

  .icon{ position:relative; width:min(74vw,380px); }
  .icon::before{ content:""; position:absolute; left:50%; top:12%; width:150px; height:150px;
    transform:translateX(-50%); border-radius:50%; z-index:0;
    background:radial-gradient(circle, rgba(230,194,92,.55), transparent 68%); animation:pulse 5s infinite; }
  @keyframes pulse{ 0%,100%{opacity:.45;transform:translateX(-50%) scale(1)} 50%{opacity:.85;transform:translateX(-50%) scale(1.1)} }
  .arch{ position:relative; padding:12px; border-radius:190px 190px 10px 10px;
    background:linear-gradient(150deg,var(--gold),#7a5a10 60%,#3a2c08);
    box-shadow:0 0 0 2px #000, 0 20px 60px rgba(0,0,0,.7), 0 0 60px rgba(230,194,92,.2); }
  .arch::before{ content:""; position:absolute; inset:4px; border-radius:186px 186px 7px 7px;
    border:1px solid rgba(0,0,0,.5); z-index:4; pointer-events:none; }
  .frame{ position:relative; overflow:hidden; border-radius:180px 180px 5px 5px; aspect-ratio:1275/1918; }
  .frame img{ width:100%;height:100%;object-fit:cover; filter:contrast(1.12) saturate(.85) brightness(.85);
    animation:crtflick 5s infinite; }
  @keyframes crtflick{ 0%,96%,100%{filter:contrast(1.12) saturate(.85) brightness(.85)}
    97%{filter:contrast(1.4) saturate(.7) brightness(1.05)} 98%{filter:contrast(1.05) saturate(.85) brightness(.75)} }
  .frame::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 28%, transparent 32%, rgba(0,0,0,.75) 100%); }
  /* ===== CRT / TV effect on the crusader ===== */
  .tv{ position:absolute; inset:0; z-index:3; pointer-events:none; mix-blend-mode:screen; opacity:.6;
    background:
      linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,.35) 50%),   /* scanlines */
      linear-gradient(90deg, rgba(255,0,0,.06), rgba(0,255,0,.02), rgba(0,0,255,.06)); /* RGB split */
    background-size:100% 3px, 100% 100%; }
  .tv::before{ content:""; position:absolute; left:0; right:0; height:22%; z-index:4;
    background:linear-gradient(rgba(255,255,255,0), rgba(255,255,255,.10), rgba(255,255,255,0));
    animation:scan 6s linear infinite; }  /* bright scan-sweep */
  @keyframes scan{ 0%{top:-25%} 100%{top:105%} }
  .eye{ position:absolute; width:15px;height:15px; z-index:5; transform:translate(-50%,-50%);
    background:radial-gradient(circle,#fff 0%,var(--electric) 38%,transparent 72%);
    box-shadow:0 0 22px 8px var(--electric); animation:flicker 3.4s infinite; }
  .eye.l{ left:var(--eyeL-x); top:var(--eyeL-y); } .eye.r{ left:var(--eyeR-x); top:var(--eyeR-y); }
  @keyframes flicker{ 0%,90%,100%{opacity:1} 91%{opacity:.15} 93%{opacity:.9} }
  .bolt{ stroke:var(--electric); stroke-width:1.5; fill:none; filter:drop-shadow(0 0 4px var(--electric)); animation:strike 3.2s infinite; }
  @keyframes strike{ 0%,72%,100%{opacity:0} 74%,79%{opacity:.9} 76%{opacity:.2} }

  .menu a{ font-family:'Cinzel',serif; letter-spacing:.25em; padding:.85rem 2.2rem;
    border:1px solid rgba(230,194,92,.45); transition:.25s; color:var(--gold); }
  .menu a:hover{ color:#050505; background:var(--gold); box-shadow:0 0 30px rgba(230,194,92,.5); }
</style>
</head>
<body>
<main class="relative flex flex-col items-center text-center px-6 pt-14 pb-16 min-h-screen">
  <h1 class="title blackletter">MAXIMAULISM</h1>
  <div class="rule w-2/3 my-3"></div>
  <p class="slogan text-base md:text-xl text-[color:var(--gold)]/90">&ldquo;Life is sweetest near the bone&rdquo;</p>

  <div class="icon mt-9">
    <div class="arch"><div class="frame">
      <img src="assets/crusader-stand-in.jpg" alt="The Crusader">
      <span class="tv"></span>
      <span class="eye l"></span><span class="eye r"></span>
      <svg class="absolute inset-0 z-[5] pointer-events-none" viewBox="0 0 100 150" preserveAspectRatio="none">
        <path class="bolt" d="M44 25 L39 40 L47 38 L37 60"/><path class="bolt" d="M52 24 L58 40 L50 38 L60 62"/>
      </svg>
    </div></div>
  </div>

  <nav class="menu mt-11 flex flex-wrap gap-7 justify-center">
    <a href="#">RHETORIC</a><a href="#">EROS</a>
  </nav>
  <p class="mt-3 text-xs tracking-[.35em] opacity-50">ESSAYS · POEMS</p>
</main>
<div class="fixed bottom-0 inset-x-0 z-40 text-center py-2 text-[.7rem] tracking-[.4em] opacity-50 bg-gradient-to-t from-black to-transparent">MAXIMAULISM — PROTOTYPE 4 / BLACK RELIQUARY</div>
</body>
</html>
