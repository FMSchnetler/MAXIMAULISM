<!DOCTYPE html>
<!--
  MAXIMAULISM — PROTOTYPE 3 of 3: "ILLUMINATED APOCALYPSE"
  Direction: medieval illuminated manuscript X emergency broadcast. Parchment
  ground, blackletter display, red rubricated slogan, gold ornamental arch
  framing the crusader as a holy icon — but with electric lightning eyes and a
  thin EMERGENCY BROADCAST strip fusing sacred + signal.

  Stand-in hero: Bohémond I of Antioch (Blondel, 1843, public domain).
  >>> SWAP: replace assets/crusader-stand-in.jpg; retune --eyeL/--eyeR. <<<
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIMAULISM — Illuminated Apocalypse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Pirata+One&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#2a1b0e; --gold:#b8860b; --gold-lt:#e6c25c; --rubric:#a01414; --electric:#3aa0ff;
    --eyeL-x:44%; --eyeL-y:25%; --eyeR-x:52%; --eyeR-y:24%; }
  *{ box-sizing:border-box; }
  body{ margin:0; color:var(--ink); min-height:100vh; overflow-x:hidden;
    font-family:'EB Garamond',Georgia,serif;
    background:#e9dcc0;
    background-image:
      radial-gradient(circle at 20% 15%, rgba(160,120,60,.18), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(120,90,40,.22), transparent 45%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/></svg>"); }

  .broadcast{ background:var(--rubric); color:#f3e6c0; font-family:'Pirata One',serif;
    letter-spacing:.35em; text-align:center; border-block:2px solid var(--gold); }
  .broadcast::before{ content:"✝ "; } .broadcast::after{ content:" ✝"; }

  .blackletter{ font-family:'UnifrakturCook','Pirata One',serif; }
  .title{ font-size:clamp(2.4rem,12vw,9rem); line-height:.9; color:var(--ink);
    text-shadow:1px 1px 0 var(--gold-lt), 0 0 30px rgba(184,134,11,.35); }
  .slogan{ font-family:'Pirata One',serif; color:var(--rubric); }

  /* illuminated arch frame */
  .icon{ position:relative; width:min(74vw,380px); }
  .arch{ position:relative; padding:14px; border-radius:190px 190px 12px 12px;
    background:linear-gradient(145deg,var(--gold-lt),var(--gold) 45%,#7a5a10);
    box-shadow:0 0 0 3px var(--ink), 0 18px 50px rgba(0,0,0,.35); }
  .arch::before{ content:""; position:absolute; inset:5px; border-radius:186px 186px 8px 8px;
    border:2px solid rgba(42,27,14,.5); pointer-events:none; z-index:4; }
  .frame{ position:relative; overflow:hidden; border-radius:180px 180px 6px 6px; aspect-ratio:1275/1918; }
  .frame img{ width:100%;height:100%;object-fit:cover; filter:sepia(.25) contrast(1.05) saturate(.95); }
  .frame::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 28%, rgba(255,220,140,.25), transparent 55%); }
  .eye{ position:absolute; width:15px;height:15px; z-index:5; transform:translate(-50%,-50%);
    background:radial-gradient(circle,#fff 0%,var(--electric) 40%,transparent 72%);
    box-shadow:0 0 22px 7px var(--electric); animation:flicker 3.6s infinite; }
  .eye.l{ left:var(--eyeL-x); top:var(--eyeL-y); } .eye.r{ left:var(--eyeR-x); top:var(--eyeR-y); }
  @keyframes flicker{ 0%,88%,100%{opacity:1} 89%{opacity:.2} 92%{opacity:.9} }
  .bolt{ stroke:var(--electric); stroke-width:1.6; fill:none; filter:drop-shadow(0 0 4px var(--electric));
    animation:strike 3.4s infinite; }
  @keyframes strike{ 0%,72%,100%{opacity:0} 74%,80%{opacity:.9} 76%{opacity:.2} }
  /* halo */
  .icon::before{ content:""; position:absolute; left:50%; top:14%; width:150px;height:150px;
    transform:translateX(-50%); border-radius:50%; z-index:0;
    background:radial-gradient(circle, rgba(230,194,92,.7), transparent 68%); animation:pulse 5s infinite; }
  @keyframes pulse{ 0%,100%{opacity:.5;transform:translateX(-50%) scale(1)} 50%{opacity:.9;transform:translateX(-50%) scale(1.12)} }

  .menu a{ font-family:'Pirata One',serif; font-size:1.5rem; letter-spacing:.15em; color:var(--ink);
    padding:.6rem 2rem; border:2px solid var(--gold); background:rgba(255,250,235,.5); transition:.2s; }
  .menu a::first-letter{ color:var(--rubric); font-size:1.4em; }
  .menu a:hover{ background:var(--rubric); color:#f3e6c0; border-color:var(--ink); }
  .rule{ height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
</style>
</head>
<body>
<div class="broadcast text-xs md:text-sm py-1">EMERGENCY BROADCAST · ANNO DOMINI MMXXVI · THE HOUR IS LATE</div>

<main class="relative flex flex-col items-center text-center px-6 pt-10 pb-20 min-h-screen">
  <h1 class="title blackletter">MAXIMAULISM</h1>
  <div class="rule w-2/3 my-3"></div>
  <p class="slogan text-2xl md:text-4xl">&ldquo;Life is sweetest near the bone&rdquo;</p>

  <div class="icon mt-8">
    <div class="arch">
      <div class="frame">
        <img src="assets/crusader-stand-in.jpg" alt="The Crusader">
        <span class="eye l"></span><span class="eye r"></span>
        <svg class="absolute inset-0 z-[5] pointer-events-none" viewBox="0 0 100 150" preserveAspectRatio="none">
          <path class="bolt" d="M44 25 L39 40 L47 38 L37 60"/>
          <path class="bolt" d="M52 24 L58 40 L50 38 L60 62"/>
        </svg>
      </div>
    </div>
  </div>

  <nav class="menu mt-12 flex flex-wrap gap-8 justify-center">
    <a href="#">Rhetoric</a><a href="#">Eros</a>
  </nav>
  <p class="mt-4 text-sm tracking-[.3em] uppercase opacity-60">Essays &nbsp;·&nbsp; Poems</p>
</main>

<div class="broadcast text-[.7rem] py-1">MAXIMAULISM — PROTOTYPE 3 / ILLUMINATED APOCALYPSE</div>
</body>
</html>
